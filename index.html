<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Cracked Or Cooked ?</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div id="sidebar"></div>

<div id="stats"></div>

<div id="main">

  <h1>Cracked Or Cooked ?</h1>

  <div id="progress"></div>

  <div id="card-container"></div>

  <div id="buttons">
    <button onclick="showAnswer()">Voir réponse</button>
    <button onclick="markKnown(true)">✅ Cracked</button>
    <button onclick="markKnown(false)">☠️ Cooked</button>
  </div>

  <button id="reset-btn" onclick="resetProgress()">↺</button>

</div>

<script src="script.js"></script>

</body>
</html>
